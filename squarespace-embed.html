<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAPYO Squarespace Embed Code</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 24px;
      line-height: 1.5;
    }
    h1 { font-size: 1.5rem; }
    textarea {
      width: 100%;
      min-height: 520px;
      font-family: ui-monospace, monospace;
      font-size: 13px;
      padding: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }
    button {
      margin-top: 12px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>MAPYO Squarespace Embed Code</h1>
  <p>Copy everything in the box below and paste it into your Squarespace <strong>Code block</strong> on the <a href="https://www.maraddai.org/mapyo">MAPYO page</a>.</p>
  <p><strong>Tip:</strong> You can also open <code>squarespace-embed.txt</code> in TextEdit — it shows the code as plain text.</p>
  <textarea id="code" readonly></textarea>
  <button type="button" id="copyBtn">Copy to clipboard</button>
  <p id="status"></p>
  <script>
    var embedCode = document.getElementById('code');
    fetch('squarespace-embed.txt')
      .then(function (r) { return r.text(); })
      .then(function (text) {
        var start = text.indexOf('<style>');
        var end = text.indexOf('COPY TO HERE');
        embedCode.value = text.slice(start, end).trim();
      })
      .catch(function () {
        embedCode.value = 'Could not load squarespace-embed.txt — open that .txt file instead.';
      });
    document.getElementById('copyBtn').addEventListener('click', function () {
      embedCode.select();
      navigator.clipboard.writeText(embedCode.value).then(function () {
        document.getElementById('status').textContent = 'Copied!';
      });
    });
  </script>
</body>
</html>
